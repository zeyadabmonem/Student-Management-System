<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="auth-container" class="container">
        <div class="card auth-card">
            <h2>Login</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required placeholder="Enter admin">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter password123">
                </div>
                <button type="submit" class="btn primary">Login</button>
                <p id="login-error" class="error-text"></p>
            </form>
        </div>
    </div>

    <div id="main-container" class="container" style="display: none;">
        <header>
            <h1>Student Management System</h1>
            <div class="user-info">
                <span id="user-display"></span>
                <button id="logout-btn" class="btn secondary">Logout</button>
            </div>
        </header>

        <main>
            <section class="actions">
                <button id="add-student-btn" class="btn primary">Add New Student</button>
            </section>

            <section class="student-list">
                <table id="student-table">
                    <thead>
                        <tr>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Email</th>
                            <th>Course</th>
                            <th>Enrollment Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="student-body">
                        <!-- Data will be populated here -->
                    </tbody>
                </table>
            </section>
        </main>

        <!-- Modal for Add/Edit -->
        <div id="student-modal" class="modal">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h2 id="modal-title">Add Student</h2>
                <form id="student-form">
                    <input type="hidden" id="student-id">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="course">Course</label>
                        <input type="text" id="course" required>
                    </div>
                    <button type="submit" class="btn primary">Save</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
